<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Sticky top bar (header + prompt bar + patch tabs) ── -->
  <div id="top-bar">

    <!-- ── Worktree switcher (shown when multiple worktrees exist) ── -->
    <div id="worktree-bar" style="display:none;"></div>

    <!-- ── Update notification banner (shown when worktree HEAD changes) ── -->
    <div id="update-banner" style="display:none;">
      <span>Codebase updated — patches may have changed.</span>
      <button id="btn-reload-page">Reload</button>
    </div>

    <!-- ── Header ── -->
    <div id="header">
      <div id="header-left">
        <h1><a href="https://github.com/alastor0325/revue" target="_blank" class="app-name">Revue</a> · <span id="bug-id-display"></span></h1>
        <div id="worktree-path"></div>
      </div>
      <div id="submit-area">
        <button id="btn-submit" disabled>Generate Review Prompt</button>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;">
          <span id="submit-warning">Add at least one comment first</span>
          <span id="autosave-status"></span>
        </div>
      </div>
    </div>

    <!-- ── Current prompt bar (shown when MD file already exists) ── -->
    <div id="current-prompt-bar" style="display:none;">
      <span id="current-prompt-label">Review prompt ready</span>
      <button id="btn-copy-current-prompt">Copy current prompt</button>
    </div>

    <!-- ── Patch tabs (shown only when there are multiple patches) ── -->
    <div id="patch-tabs-bar" style="display:none;">
      <div id="patch-tabs"></div>
    </div>

  </div>

  <!-- ── Loading / error ── -->
  <div id="loading">Loading diff…</div>
  <div id="error-msg" style="display:none;"></div>

  <!-- ── Main layout: file nav sidebar + diff content ── -->
  <div id="main-layout">
    <nav id="file-nav" style="display:none;"></nav>
    <div id="files-changed" style="display:none;"></div>
  </div>

  <!-- ── Result overlay ── -->
  <div id="result-overlay">
    <div id="result-modal">
      <h3>Review saved!</h3>
      <p>Saved to: <code id="result-feedback-path"></code></p>
      <textarea id="result-prompt" readonly></textarea>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button id="btn-copy-prompt">Copy prompt</button>
        <button id="btn-close-modal">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
