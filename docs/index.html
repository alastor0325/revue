<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>firefox-review — interactive demo</title>
  <link rel="stylesheet" href="../public/style.css" />
  <style>
    #demo-banner {
      background: #388bfd22;
      border-bottom: 1px solid #388bfd55;
      padding: 8px 24px;
      font-size: 13px;
      color: #79c0ff;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #demo-banner strong { color: #e6edf3; }
    #demo-banner a { color: #79c0ff; }
    #demo-banner .demo-note { color: #8b949e; }
  </style>
</head>
<body>

  <div id="demo-banner">
    <strong>Interactive demo</strong>
    <span class="demo-note">Fake patch data — all UI interactions work. Saves are no-ops.</span>
    <a href="https://github.com/alastor0325/firefox-review" style="margin-left:auto;">View on GitHub →</a>
  </div>

  <!-- ── Header ── -->
  <div id="header">
    <div id="header-left">
      <h1>firefox-review · <span id="bug-id-display"></span></h1>
      <div id="worktree-path"></div>
    </div>
    <div id="submit-area">
      <button id="btn-submit" disabled>Generate Review Prompt</button>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;">
        <span id="submit-warning">Review at least one patch before generating the prompt</span>
        <span id="autosave-status"></span>
      </div>
    </div>
  </div>

  <!-- ── Current prompt bar ── -->
  <div id="current-prompt-bar" style="display:none;">
    <span id="current-prompt-label">Review prompt ready</span>
    <button id="btn-copy-current-prompt">Copy current prompt</button>
  </div>

  <!-- ── Patch tabs ── -->
  <div id="patch-tabs-bar" style="display:none;">
    <div id="patch-tabs"></div>
  </div>

  <!-- ── Loading / error ── -->
  <div id="loading">Loading diff…</div>
  <div id="error-msg" style="display:none;"></div>

  <!-- ── Files changed ── -->
  <div id="files-changed" style="display:none;"></div>

  <!-- ── Result overlay ── -->
  <div id="result-overlay">
    <div id="result-modal">
      <h3>Review saved!</h3>
      <p>Saved to: <code id="result-feedback-path"></code></p>
      <textarea id="result-prompt" readonly></textarea>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button id="btn-copy-prompt">Copy prompt</button>
        <button id="btn-close-modal">Close</button>
      </div>
    </div>
  </div>

  // ── Mock fetch ────────────────────────────────────────────────────────────

  window.fetch = function(url, opts) {
    // GET /api/diff
    if (url === '/api/diff') {
      return Promise.resolve({
        ok: true,
        json: () => Promise.resolve(MOCK_DIFF),
      });
    }
    // GET /api/state
    if (url === '/api/state' && (!opts || opts.method !== 'POST')) {
      return Promise.resolve({
        ok: true,
        json: () => Promise.resolve(MOCK_STATE),
      });
    }
    // POST /api/state (auto-save — no-op in demo)
    if (url === '/api/state' && opts && opts.method === 'POST') {
      return Promise.resolve({
        ok: true,
        json: () => Promise.resolve({ ok: true }),
      });
    }
    // POST /api/submit
    if (url === '/api/submit') {
      return Promise.resolve({
        ok: true,
        json: () => Promise.resolve({
          ok: true,
          feedbackPath: '/Users/dev/firefox-bug-1234567/REVIEW_FEEDBACK_bug-1234567.md',
          prompt: 'Please read the review feedback at /Users/dev/firefox-bug-1234567/REVIEW_FEEDBACK_bug-1234567.md and apply all the changes described there to your implementation in worktree firefox-bug-1234567.',
        }),
      });
    }
    // GET /api/patchdiff/:hash (previous revision diff)
    if (url.startsWith('/api/patchdiff/')) {
      return Promise.resolve({
        ok: true,
        json: () => Promise.resolve(MOCK_OLD_DIFF_PART2),
      });
    }
    // Fallback — should not happen in demo
    return Promise.reject(new Error(`Unmocked fetch: ${url}`));

</html>
